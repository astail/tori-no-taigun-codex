name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test, build, and container smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked package metadata
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run tests and verify build
        run: npm run check

      - name: Build hardened container
        run: docker build --pull --tag tori-step:test .

      - name: Start container
        run: docker run --detach --name tori-step-test --publish 127.0.0.1:8080:8080 tori-step:test

      - name: Verify non-root user and HTTP response
        run: |
          test "$(docker inspect --format '{{.Config.User}}' tori-step:test)" = "101"
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent --show-error --head http://127.0.0.1:8080/; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Stop test container
        if: always()
        run: docker rm --force tori-step-test || true
